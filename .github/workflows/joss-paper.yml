name: JOSS Paper

on:
  push:
    branches: [ main, master, ncpi-tests ]
    paths:
      - docs/joss_paper/**
      - .github/workflows/joss-paper.yml
  pull_request:
    branches: [ main, master, ncpi-tests ]
    paths:
      - docs/joss_paper/**
      - .github/workflows/joss-paper.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  paper:
    name: Build JOSS paper PDF
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build draft PDF
        uses: openjournals/openjournals-draft-action@master
        with:
          journal: joss
          paper-path: docs/joss_paper/paper.md

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: joss-paper
          path: docs/joss_paper/paper.pdf
